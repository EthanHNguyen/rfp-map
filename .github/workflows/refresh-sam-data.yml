name: Refresh SAM.gov map data

on:
  schedule:
    # SAM.gov active Contract Opportunities are updated daily. Run after the
    # overnight bulk CSV refresh to rebuild the compact static map payload.
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild compact SAM.gov map tiles
        run: npm run ingest:sam -- --force

      - name: Validate static app with refreshed data
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Commit refreshed data if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/map-tiles.json public/data/bulk-summary.json
          if git diff --cached --quiet; then
            echo "No SAM.gov data changes to commit."
          else
            git commit -m "chore: refresh SAM.gov map data"
            git push
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy refreshed site to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
